services:
  db:
    image: postgres:16
    container_name: tournament-db
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tournament-network

  tournament-api-service:
    build:
      context: ApiService/
      dockerfile: Dockerfile
    container_name: tournament-api-service
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    ports:
      - "8080:8080"
    networks:
      - tournament-network

volumes:
  postgres_data:

networks:
  tournament-network:
    driver: bridge